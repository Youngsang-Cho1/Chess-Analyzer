services:
  chess-analyzer:
    build: ./backend
    container_name: chess-analyzer
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app
      - risk_models:/app/data/risk
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  risk_models:
